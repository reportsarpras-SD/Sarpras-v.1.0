<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Geospasial - SIGAP-SD BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-mortarboard-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIGAP-SD BADUNG</h6>
            <small class="text-white-50">Peta Geospasial</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="sekolah.html" class="nav-link-sidebar"><i class="bi bi-building me-2"></i>Data Sekolah</a>
            <a href="sarpras.html" class="nav-link-sidebar"><i class="bi bi-box-seam me-2"></i>Sarana Prasarana</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-bug me-2"></i>Laporan Kerusakan</a>
            <a href="monitoring.html" class="nav-link-sidebar"><i class="bi bi-tools me-2"></i>Monitoring</a>
            <a href="peta.html" class="nav-link-sidebar active"><i class="bi bi-geo-alt me-2"></i>Peta Geospasial</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line me-2"></i>Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-navy"><i class="bi bi-geo-alt me-2"></i>Peta Geospasial Sekolah</h5>
            <select class="form-select form-select-sm d-inline-block w-auto" id="filterPeta" onchange="filterPeta()">
                <option value="semua">Semua Kondisi</option>
                <option value="baik">Baik</option>
                <option value="rusak-ringan">Rusak Ringan</option>
                <option value="rusak-berat">Rusak Berat</option>
            </select>
        </nav>

        <div class="content-area p-4">
            <div class="row g-3 mb-3">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 text-center">
                        <i class="bi bi-check-circle-fill text-success fs-2"></i>
                        <h5 class="fw-bold mb-0" id="countBaik">0</h5>
                        <small class="text-muted">Kondisi Baik</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 text-center">
                        <i class="bi bi-exclamation-circle-fill text-warning fs-2"></i>
                        <h5 class="fw-bold mb-0" id="countRingan">0</h5>
                        <small class="text-muted">Rusak Ringan</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 text-center">
                        <i class="bi bi-x-circle-fill text-danger fs-2"></i>
                        <h5 class="fw-bold mb-0" id="countBerat">0</h5>
                        <small class="text-muted">Rusak Berat</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 text-center">
                        <i class="bi bi-building text-navy fs-2"></i>
                        <h5 class="fw-bold mb-0" id="countTotal">0</h5>
                        <small class="text-muted">Total Sekolah</small>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div id="mapPeta" style="height:600px; border-radius:8px;"></div>
                </div>
            </div>

            <div class="card shadow-sm border-0 mt-3">
                <div class="card-header bg-white fw-bold text-navy">
                    <i class="bi bi-list me-2"></i>Daftar Sekolah
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-navy text-white">
                                <tr>
                                    <th>No</th><th>Nama Sekolah</th><th>Kecamatan</th>
                                    <th>Kondisi</th><th>Koordinat</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyPeta">
                                <tr><td colspan="5" class="text-center py-3">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/helper.js"></script>
    <script>
        const map = L.map('mapPeta').setView([-8.8006, 115.1785], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OpenStreetMap' 
        }).addTo(map);

        let markers = [];
        let allSekolah = [];
        const warnaKondisi = { 'baik': '#198754', 'rusak-ringan': '#ffc107', 'rusak-berat': '#dc3545' };

        async function loadPeta() {
            showLoading('Memuat data peta...');
            const result = await getSekolah();
            hideLoading();

            if (result && result.success && result.data.length > 0) {
                allSekolah = result.data;
                renderPeta(allSekolah);
                updateCount(allSekolah);
            } else {
                document.getElementById('tbodyPeta').innerHTML = 
                    '<tr><td colspan="5" class="text-center text-muted py-4">Belum ada data sekolah</td></tr>';
                
                L.marker([-8.8006, 115.1785]).addTo(map)
                    .bindPopup('<strong>Belum ada data sekolah</strong><br>Silakan tambah data di menu Data Sekolah.')
                    .openPopup();
            }
        }

        function renderPeta(data) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            data.forEach(s => {
                if (s.latitude && s.longitude) {
                    const kondisi = s.kondisi_sarpras || 'baik';
                    const marker = L.circleMarker([s.latitude, s.longitude], {
                        radius: 18,
                        fillColor: warnaKondisi[kondisi],
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <strong>${s.nama_sekolah}</strong><br>
                        <small>NPSN: ${s.npsn||'-'}</small><br>
                        <small>Kecamatan: ${s.kecamatan||'-'}</small><br>
                        <small>Desa: ${s.desa||'-'}</small><br>
                        <small>Kondisi: <b>${kondisi}</b></small><br>
                        <small>Siswa: ${s.jumlah_siswa||0}</small>
                    `);
                    markers.push(marker);
                }
            });

            const tbody = document.getElementById('tbodyPeta');
            tbody.innerHTML = data.map((s, i) => {
                const kondisi = s.kondisi_sarpras || 'baik';
                let badge = 'bg-success';
                if (kondisi === 'rusak-ringan') badge = 'bg-warning text-dark';
                else if (kondisi === 'rusak-berat') badge = 'bg-danger';
                return `<tr>
                    <td>${i+1}</td>
                    <td><strong>${s.nama_sekolah}</strong></td>
                    <td>${s.kecamatan||'-'}</td>
                    <td><span class="badge ${badge}">${kondisi}</span></td>
                    <td><small>${s.latitude||'-'}, ${s.longitude||'-'}</small></td>
                </tr>`;
            }).join('');
        }

        function updateCount(data) {
            let baik = 0, ringan = 0, berat = 0;
            data.forEach(s => {
                const k = s.kondisi_sarpras || 'baik';
                if (k === 'baik') baik++;
                else if (k === 'rusak-ringan') ringan++;
                else if (k === 'rusak-berat') berat++;
            });
            document.getElementById('countBaik').textContent = baik;
            document.getElementById('countRingan').textContent = ringan;
            document.getElementById('countBerat').textContent = berat;
            document.getElementById('countTotal').textContent = data.length;
        }

        function filterPeta() {
            const filter = document.getElementById('filterPeta').value;
            if (filter === 'semua') {
                renderPeta(allSekolah);
                updateCount(allSekolah);
            } else {
                const filtered = allSekolah.filter(s => (s.kondisi_sarpras || 'baik') === filter);
                renderPeta(filtered);
                updateCount(filtered);
            }
        }

        loadPeta();
    </script>
</body>
</html>
