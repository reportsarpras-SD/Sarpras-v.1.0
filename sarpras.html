<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarana Prasarana - SIGAP-SD BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-mortarboard-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIGAP SARPRAS SD</h6>
            <small class="text-white-50">Sarana Prasarana</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="sekolah.html" class="nav-link-sidebar"><i class="bi bi-building me-2"></i>Data Sekolah</a>
            <a href="sarpras.html" class="nav-link-sidebar active"><i class="bi bi-box-seam me-2"></i>Sarana Prasarana</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-bug me-2"></i>Laporan Kerusakan</a>
            <a href="monitoring.html" class="nav-link-sidebar"><i class="bi bi-tools me-2"></i>Monitoring</a>
            <a href="peta.html" class="nav-link-sidebar"><i class="bi bi-geo-alt me-2"></i>Peta Geospasial</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line me-2"></i>Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-navy">Inventaris Sarana & Prasarana</h5>
            <button class="btn btn-navy btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalTambah">
                <i class="bi bi-plus-circle me-1"></i>Tambah Item
            </button>
        </nav>

        <div class="content-area p-4">
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Sekolah</label>
                    <select class="form-select form-select-sm" id="filterSekolah">
                        <option value="">Semua Sekolah</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Kategori</label>
                    <select class="form-select form-select-sm" id="filterKategori">
                        <option value="">Semua</option>
                        <option>Ruang Kelas</option><option>Meja & Kursi</option>
                        <option>Perpustakaan</option><option>Lab Komputer</option>
                        <option>Toilet</option><option>Lapangan</option><option>Lainnya</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Kondisi</label>
                    <select class="form-select form-select-sm" id="filterKondisi">
                        <option value="">Semua</option>
                        <option>baik</option><option>Rusak Ringan</option><option>Rusak Berat</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-navy btn-sm w-100" onclick="loadSarpras()">
                        <i class="bi bi-search me-1"></i>Cari
                    </button>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-navy text-white">
                                <tr>
                                    <th>No</th><th>Sekolah</th><th>Kategori</th>
                                    <th>Nama Barang</th><th>Jumlah</th><th>Kondisi</th>
                                    <th>Tahun</th><th>Nilai</th>
                                </tr>
                            </thead>
                            <tbody id="tbodySarpras">
                                <tr><td colspan="8" class="text-center py-4">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTambah" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-navy text-white">
                    <h5 class="modal-title"><i class="bi bi-box-seam me-2"></i>Tambah Sarana Prasarana</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSarpras">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Sekolah *</label>
                                <select class="form-select" name="sekolah_id" required>
                                    <option value="">Pilih Sekolah</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Kategori *</label>
                                <select class="form-select" name="kategori" required>
                                    <option>Ruang Kelas</option>
                                    <option>Meja & Kursi</option>
                                    <option>Perpustakaan</option>
                                    <option>Lab Komputer</option>
                                    <option>Toilet</option>
                                    <option>Lapangan</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nama Barang *</label>
                                <input type="text" class="form-control" name="nama_barang" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Jumlah</label>
                                <input type="number" class="form-control" name="jumlah" value="1">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Tahun Perolehan</label>
                                <input type="number" class="form-control" name="tahun_perolehan" value="2026">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Kondisi</label>
                                <select class="form-select" name="kondisi">
                                    <option>baik</option>
                                    <option>Rusak Ringan</option>
                                    <option>Rusak Berat</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Lokasi</label>
                                <input type="text" class="form-control" name="lokasi" placeholder="cth: Ruang Kelas 1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Nilai (Rp)</label>
                                <input type="number" class="form-control" name="nilai">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Keterangan</label>
                                <textarea class="form-control" name="keterangan" rows="2"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-navy" onclick="submitSarpras()">
                        <i class="bi bi-save me-1"></i>SIMPAN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/helper.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDropdownSekolah();
            loadSarpras();
        });

        async function loadDropdownSekolah() {
            const result = await getSekolah();
            if (result && result.success) {
                const options = result.data.map(s => 
                    `<option value="${s.id}" data-nama="${s.nama_sekolah}">${s.nama_sekolah} (${s.npsn})</option>`
                ).join('');
                document.querySelectorAll('select[name="sekolah_id"]').forEach(el => {
                    el.innerHTML = '<option value="">Pilih Sekolah</option>' + options;
                });
                document.getElementById('filterSekolah').innerHTML = '<option value="">Semua Sekolah</option>' + options;
            }
        }

        async function loadSarpras() {
            showLoading('Memuat data...');
            const result = await getSarpras({
                kategori: document.getElementById('filterKategori').value,
                kondisi: document.getElementById('filterKondisi').value
            });
            hideLoading();
            
            if (result && result.success) {
                renderSarpras(result.data);
            } else {
                showNotif('Gagal memuat data', 'danger');
            }
        }

        function renderSarpras(data) {
            const tbody = document.getElementById('tbodySarpras');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada data sarpras</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((r, i) => {
                let badge = 'bg-success';
                if (r.kondisi === 'Rusak Ringan') badge = 'bg-warning text-dark';
                else if (r.kondisi === 'Rusak Berat') badge = 'bg-danger';
                const nilai = r.nilai ? 'Rp ' + Number(r.nilai).toLocaleString('id-ID') : '-';
                return `<tr>
                    <td>${i+1}</td>
                    <td>${r.nama_sekolah||'-'}</td>
                    <td>${r.kategori||'-'}</td>
                    <td><strong>${r.nama_barang||'-'}</strong></td>
                    <td>${r.jumlah||0}</td>
                    <td><span class="badge ${badge}">${r.kondisi||'baik'}</span></td>
                    <td>${r.tahun_perolehan||'-'}</td>
                    <td>${nilai}</td>
                </tr>`;
            }).join('');
        }

        async function submitSarpras() {
            const form = document.getElementById('formSarpras');
            const data = Object.fromEntries(new FormData(form).entries());
            
            if (!data.sekolah_id || !data.nama_barang) {
                showNotif('Sekolah dan Nama Barang wajib diisi', 'danger');
                return;
            }

            const selectSekolah = form.querySelector('select[name="sekolah_id"]');
            data.nama_sekolah = selectSekolah.options[selectSekolah.selectedIndex].dataset.nama || '';

            showLoading('Menyimpan...');
            const result = await saveSarpras(data);
            hideLoading();
            
            if (result && result.success) {
                showNotif('✅ Sarpras berhasil ditambahkan', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalTambah')).hide();
                form.reset();
                loadSarpras();
            } else {
                showNotif('❌ Gagal menyimpan', 'danger');
            }
        }
    </script>
</body>
</html>
