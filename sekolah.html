<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sekolah - SIGAP-SD BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-mortarboard-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIGAP-SD BADUNG</h6>
            <small class="text-white-50">Data Sekolah</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="sekolah.html" class="nav-link-sidebar active"><i class="bi bi-building me-2"></i>Data Sekolah</a>
            <a href="sarpras.html" class="nav-link-sidebar"><i class="bi bi-box-seam me-2"></i>Sarana Prasarana</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-bug me-2"></i>Laporan Kerusakan</a>
            <a href="monitoring.html" class="nav-link-sidebar"><i class="bi bi-tools me-2"></i>Monitoring</a>
            <a href="peta.html" class="nav-link-sidebar"><i class="bi bi-geo-alt me-2"></i>Peta Geospasial</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line me-2"></i>Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-navy">Data Sekolah Dasar</h5>
            <button class="btn btn-navy btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalTambah">
                <i class="bi bi-plus-circle me-1"></i>Tambah Sekolah
            </button>
        </nav>

        <div class="content-area p-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold">Kecamatan</label>
                            <select class="form-select form-select-sm" id="filterKec">
                                <option value="">Semua Kecamatan</option>
                                <option>Kuta</option><option>Kuta Selatan</option>
                                <option>Abiansemal</option><option>Mengwi</option><option>Petang</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold">Akreditasi</label>
                            <select class="form-select form-select-sm" id="filterAkreditasi">
                                <option value="">Semua</option>
                                <option>A</option><option>B</option><option>C</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-navy btn-sm w-100" onclick="loadSekolah()">
                                <i class="bi bi-search me-1"></i>Cari
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-navy text-white">
                                <tr>
                                    <th>No</th><th>NPSN</th><th>Nama Sekolah</th>
                                    <th>Kepsek</th><th>Kecamatan</th><th>Desa</th>
                                    <th>Akreditasi</th><th>Siswa</th><th>Kondisi</th><th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tbodySekolah">
                                <tr><td colspan="10" class="text-center py-4">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <small class="text-muted" id="infoData">Menampilkan 0 data</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Sekolah -->
    <div class="modal fade" id="modalTambah" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-navy text-white">
                    <h5 class="modal-title"><i class="bi bi-building me-2"></i>Tambah Data Sekolah</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSekolah">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">NPSN *</label>
                                <input type="text" class="form-control" name="npsn" maxlength="8" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nama Sekolah *</label>
                                <input type="text" class="form-control" name="nama_sekolah" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Kepala Sekolah</label>
                                <input type="text" class="form-control" name="kepala_sekolah">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">NIP Kepsek</label>
                                <input type="text" class="form-control" name="nip_kepsek">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Alamat</label>
                                <textarea class="form-control" name="alamat" rows="2"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Desa/Kelurahan</label>
                                <input type="text" class="form-control" name="desa">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Kecamatan</label>
                                <select class="form-select" name="kecamatan">
                                    <option value="">Pilih</option>
                                    <option>Kuta</option><option>Kuta Selatan</option>
                                    <option>Abiansemal</option><option>Mengwi</option><option>Petang</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Akreditasi</label>
                                <select class="form-select" name="akreditasi">
                                    <option>A</option><option>B</option><option>C</option>
                                    <option>Belum Akreditasi</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Jumlah Siswa</label>
                                <input type="number" class="form-control" name="jumlah_siswa">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Jumlah Guru</label>
                                <input type="number" class="form-control" name="jumlah_guru">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Jumlah Rombel</label>
                                <input type="number" class="form-control" name="jumlah_rombel">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Status</label>
                                <select class="form-select" name="status">
                                    <option>Negeri</option><option>Swasta</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Latitude</label>
                                <input type="number" step="any" class="form-control" name="latitude" placeholder="-8.xxxx">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Longitude</label>
                                <input type="number" step="any" class="form-control" name="longitude" placeholder="115.xxxx">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Kondisi Sarpras</label>
                                <select class="form-select" name="kondisi_sarpras">
                                    <option>baik</option>
                                    <option>rusak-ringan</option>
                                    <option>rusak-berat</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-navy" onclick="submitSekolah()">
                        <i class="bi bi-save me-1"></i>SIMPAN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/helper.js"></script>
    <script>
        // Load data saat halaman dibuka
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Halaman sekolah.html dimuat');
            loadSekolah();
        });

        async function loadSekolah() {
            console.log('🔄 Memulai loadSekolah()...');
            showLoading('Memuat data sekolah...');
            
            // Ambil nilai filter (jika kosong, jangan kirim)
            const filterKec = document.getElementById('filterKec').value;
            const filterAkred = document.getElementById('filterAkreditasi').value;
            
            console.log('🔍 Filter:', { kecamatan: filterKec, akreditasi: filterAkred });
            
            // Bangun filter object (hanya kirim yang tidak kosong)
            const filters = {};
            if (filterKec) filters.kecamatan = filterKec;
            if (filterAkred) filters.akreditasi = filterAkred;
            
            console.log('📡 Memanggil API getSekolah dengan filters:', filters);
            
            try {
                const result = await getSekolah(filters);
                console.log('✅ Response dari API:', result);
                
                hideLoading();
                
                if (result && result.success) {
                    console.log('📊 Data yang diterima:', result.data);
                    console.log(' Jumlah data:', result.data.length);
                    
                    if (result.data.length === 0) {
                        console.warn('⚠️ Data kosong!');
                        document.getElementById('tbodySekolah').innerHTML = 
                            '<tr><td colspan="10" class="text-center text-muted py-4">Belum ada data sekolah</td></tr>';
                        document.getElementById('infoData').textContent = 'Menampilkan 0 data';
                    } else {
                        renderSekolah(result.data);
                    }
                } else {
                    console.error('❌ API return error:', result);
                    showNotif('Gagal memuat data: ' + (result?.message || 'Unknown error'), 'danger');
                }
            } catch (error) {
                console.error(' Error saat loadSekolah:', error);
                hideLoading();
                showNotif('Error: ' + error.message, 'danger');
            }
        }

        function renderSekolah(data) {
            console.log('🎨 Memulai renderSekolah() dengan', data.length, 'data');
            
            const tbody = document.getElementById('tbodySekolah');
            const info = document.getElementById('infoData');
            
            if (!data || data.length === 0) {
                console.warn('⚠️ Data kosong atau null');
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">Belum ada data sekolah</td></tr>';
                info.textContent = 'Menampilkan 0 data';
                return;
            }

            try {
                const html = data.map((r, i) => {
                    console.log(`📝 Rendering baris ${i+1}:`, r);
                    
                    let badgeAkred = 'bg-success';
                    if (r.akreditasi === 'B') badgeAkred = 'bg-primary';
                    else if (r.akreditasi === 'C') badgeAkred = 'bg-warning text-dark';
                    else if (r.akreditasi === 'Belum Akreditasi') badgeAkred = 'bg-secondary';
                    
                    let kondisi = r.kondisi_sarpras || 'baik';
                    let badgeKondisi = 'bg-success';
                    if (kondisi === 'rusak-ringan') badgeKondisi = 'bg-warning text-dark';
                    else if (kondisi === 'rusak-berat') badgeKondisi = 'bg-danger';

                    return `<tr>
                        <td>${i+1}</td>
                        <td>${r.npsn || '-'}</td>
                        <td><strong>${r.nama_sekolah || '-'}</strong></td>
                        <td>${r.kepala_sekolah || '-'}</td>
                        <td>${r.kecamatan || '-'}</td>
                        <td>${r.desa || '-'}</td>
                        <td><span class="badge ${badgeAkred}">${r.akreditasi || '-'}</span></td>
                        <td>${r.jumlah_siswa || 0}</td>
                        <td><span class="badge ${badgeKondisi}">${kondisi}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="hapusSekolah('${r.id}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>`;
                }).join('');
                
                console.log('✅ HTML generated, length:', html.length);
                tbody.innerHTML = html;
                info.textContent = `Menampilkan ${data.length} sekolah`;
                console.log('✅ Render selesai!');
                
            } catch (error) {
                console.error('💥 Error saat render:', error);
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-4">Error saat menampilkan data</td></tr>';
            }
        }

        async function submitSekolah() {
            const form = document.getElementById('formSekolah');
            const data = Object.fromEntries(new FormData(form).entries());

            console.log('💾 Data yang akan disimpan:', data);

            if (!data.npsn || !data.nama_sekolah) {
                showNotif('NPSN dan Nama wajib diisi!', 'danger');
                return;
            }

            showLoading('Menyimpan...');
            const result = await saveSekolah(data);
            hideLoading();

            console.log('💾 Response save:', result);

            if (result && result.success) {
                showNotif('✅ Sekolah berhasil ditambahkan!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalTambah')).hide();
                form.reset();
                loadSekolah();
            } else {
                showNotif('❌ Gagal: ' + (result?.message || 'Unknown error'), 'danger');
            }
        }

        async function hapusSekolah(id) {
            if (!confirm('Yakin hapus sekolah ini?')) return;
            showLoading('Menghapus...');
            const result = await deleteSekolah(id);
            hideLoading();
            if (result && result.success) {
                showNotif('Data dihapus', 'success');
                loadSekolah();
            }
        }
    </script>
</body>
</html>
